<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Telaah Ilmiah Epidemiologi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  :root {
    --bg: #F2F2F7;
    --bg2: #FFFFFF;
    --card: #FFFFFF;
    --text: #1C1C1E;
    --text-secondary: #3C3C43;
    --text-muted: #8E8E93;
    --border: #E5E5EA;
    --sep: rgba(60,60,67,0.09);
    --tint: #007AFF;
    --tint-bg: rgba(0,122,255,0.08);
    --card-shadow: 0 0.5px 0 0 rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    --modal-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    --tab-bg: rgba(249,249,249,0.94);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dark {
    --bg: #000000;
    --bg2: #1C1C1E;
    --card: #1C1C1E;
    --text: #F5F5F7;
    --text-secondary: #AEAEB2;
    --text-muted: #636366;
    --border: #38383A;
    --sep: rgba(84,84,88,0.36);
    --tint: #0A84FF;
    --tint-bg: rgba(10,132,255,0.12);
    --card-shadow: 0 0.5px 0 0 rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.3);
    --tab-bg: rgba(28,28,30,0.88);
  }

  body {
    background: var(--bg);
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  #root {
    width: 100%;
    max-width: 430px;
    position: relative;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow: hidden;
    background: var(--bg);
  }

  /* ===== DYNAMIC ISLAND STATUS BAR ===== */
  #dynamic-island-area {
    background: var(--bg);
    padding: 12px 24px 0;
    position: relative;
    z-index: 50;
  }
  #dynamic-island {
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 22px;
    margin: 0 auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .dark #dynamic-island { background: #2C2C2E; }
  #dynamic-island .island-dot {
    width: 12px;
    height: 12px;
    background: #1C1C1E;
    border-radius: 50%;
    position: absolute;
    right: 36px;
  }
  .dark #dynamic-island .island-dot { background: #000; }

  #status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 6px 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  #status-bar .status-icons {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
  }

  /* ===== CREATOR BANNER ===== */
  #creator-banner {
    background: linear-gradient(135deg, #1C1C1E, #2C2C2E);
    color: #fff;
    text-align: center;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0 20px 8px;
    border-radius: 12px;
  }
  .dark #creator-banner {
    background: linear-gradient(135deg, #2C2C2E, #3A3A3C);
  }

  /* ===== SCROLL AREA ===== */
  #scroll-area {
    height: calc(100vh - 180px);
    overflow-y: auto;
    overflow-x: hidden;
    padding-top: 4px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    overscroll-behavior-y: contain;
  }
  #scroll-area::-webkit-scrollbar { display: none; }

  /* ===== TAB BAR — iOS 17 ===== */
  #tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    -webkit-transform: translateX(-50%);
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: auto;
    min-height: 56px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: var(--tab-bg);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.33px solid var(--sep);
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding-top: 8px;
    z-index: 100;
  }
  .tab-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    gap: 3px;
    padding: 4px 20px 10px;
    min-width: 64px;
    min-height: 48px;
    -webkit-transition: -webkit-transform 0.15s var(--spring);
    transition: transform 0.15s var(--spring);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn:active { transform: scale(0.88); }
  .tab-btn span {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.01em;
    transition: color 0.2s;
  }
  .tab-btn.active span { color: var(--tint); }
  .tab-btn svg {
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .tab-btn.active svg { color: var(--tint); }

  /* ===== NAVIGATION ===== */
  .back-btn {
    background: none;
    border: none;
    color: var(--tint);
    font-size: 17px;
    font-weight: 400;
    cursor: pointer;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    gap: 4px;
    padding: 12px 4px;
    min-height: 44px;
    -webkit-transition: opacity 0.15s;
    transition: opacity 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
    appearance: none;
  }
  .back-btn:active { opacity: 0.5; }
  .back-row {
    display: flex;
    align-items: center;
    padding: 0 14px 4px;
  }

  /* ===== CARDS — iOS 17 GROUPED STYLE ===== */
  .card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }
  .list-item {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 0.33px solid var(--sep);
    -webkit-transition: background 0.12s;
    transition: background 0.12s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .list-item:active { background: rgba(0,0,0,0.04); }
  .dark .list-item:active { background: rgba(255,255,255,0.04); }
  .list-item:last-child { border-bottom: none; }
  .chev { opacity: 0.2; flex-shrink: 0; }

  /* ===== PAGE LAYOUT ===== */
  .page { padding: 0 20px 120px; padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px)); }
  h1.page-title {
    font-size: 34px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 20px;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }

  /* ===== HERO CARD — iOS 17 STYLE ===== */
  .hero-card {
    background: linear-gradient(145deg, #007AFF, #5856D6);
    border-radius: 22px;
    padding: 24px;
    color: #fff;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 8px 32px rgba(0,122,255,0.18);
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .dark .hero-card {
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* ===== SECTION LABEL ===== */
  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  /* ===== QUICK SCROLL CARDS ===== */
  .quick-scroll {
    display: -webkit-flex;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
    margin-bottom: 24px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .quick-scroll::-webkit-scrollbar { display: none; }
  .quick-card {
    min-width: 140px;
    background: var(--card);
    border-radius: 18px;
    padding: 18px 16px;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    -webkit-transition: -webkit-transform 0.2s var(--spring), box-shadow 0.2s;
    transition: transform 0.2s var(--spring), box-shadow 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .quick-card:active {
    -webkit-transform: scale(0.96);
    transform: scale(0.96);
  }

  /* ===== PROGRESS BARS ===== */
  .prog-bar-bg {
    background: var(--sep);
    border-radius: 10px;
    height: 4px;
    overflow: hidden;
  }
  .prog-bar-bg.thick { height: 6px; }
  .prog-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.6s var(--ease-smooth);
  }

  /* ===== INFO ROWS ===== */
  .info-row {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 0.33px solid var(--sep);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { flex: 1; font-size: 15px; color: var(--text); }
  .info-val { font-size: 15px; font-weight: 500; color: var(--text-muted); }

  /* ===== MEETING DETAIL HEADER ===== */
  .meeting-header {
    border-radius: 22px;
    padding: 28px 24px;
    margin-bottom: 20px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .meeting-header::after {
    content: '';
    position: absolute;
    bottom: -40%;
    left: -20%;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .meeting-header .m-icon { font-size: 48px; margin-bottom: 10px; }
  .meeting-header .m-sub {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.75;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .meeting-header h2 {
    font-size: 26px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }
  .meeting-prog-bg {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    height: 6px;
    overflow: hidden;
  }
  .meeting-prog-fill {
    background: #fff;
    height: 100%;
    border-radius: 20px;
    transition: width 0.6s var(--ease-smooth);
  }
  .meeting-prog-pct {
    font-size: 12px;
    opacity: 0.65;
    margin-top: 6px;
    font-weight: 500;
  }

  .meeting-intro {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: var(--card-shadow);
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* ===== VISUAL CARD ===== */
  .visual-card {
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .visual-card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 14px 18px 0;
  }
  .visual-card svg { display: block; width: 100%; }

  /* ===== SECTION ROW ===== */
  .section-row {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 0.33px solid var(--sep);
    -webkit-transition: background 0.12s;
    transition: background 0.12s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .section-row:active { background: rgba(0,0,0,0.04); }
  .dark .section-row:active { background: rgba(255,255,255,0.04); }
  .section-row:last-child { border-bottom: none; }
  .section-num {
    width: 30px;
    height: 30px;
    border-radius: 10px;
    margin-right: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }
  .section-title-text {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  /* ===== SECTION DETAIL ===== */
  .pertemuan-badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .section-content-box {
    background: var(--card);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--card-shadow);
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-secondary);
    word-wrap: break-word;
    overflow-wrap: break-word;
    -webkit-hyphens: auto;
    hyphens: auto;
  }
  .mark-btn {
    width: 100%;
    margin-top: 16px;
    padding: 17px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-size: 17px;
    font-weight: 600;
    -webkit-transition: -webkit-transform 0.15s var(--spring), opacity 0.12s;
    transition: transform 0.15s var(--spring), opacity 0.12s;
    letter-spacing: -0.01em;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
    appearance: none;
  }
  .mark-btn:active { -webkit-transform: scale(0.97); transform: scale(0.97); opacity: 0.85; }
  .next-btn {
    width: 100%;
    margin-top: 8px;
    padding: 17px;
    border-radius: 14px;
    border: none;
    background: var(--tint-bg);
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    color: var(--tint);
    -webkit-transition: -webkit-transform 0.15s var(--spring);
    transition: transform 0.15s var(--spring);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
    appearance: none;
  }
  .next-btn:active { -webkit-transform: scale(0.97); transform: scale(0.97); }

  /* ===== PROGRESS PAGE ===== */
  .prog-center { display: flex; justify-content: center; margin-bottom: 24px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    box-shadow: var(--card-shadow);
  }
  .stat-num {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .stat-label { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .stat-sub { font-size: 12px; color: var(--text-muted); }
  .prog-list-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: var(--card-shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  /* ===== DARK TOGGLE ===== */
  #dark-toggle {
    width: 42px;
    height: 42px;
    border-radius: 21px;
    background: var(--card);
    border: none;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    font-size: 20px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    -webkit-transition: -webkit-transform 0.2s var(--spring);
    transition: transform 0.2s var(--spring);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
  }
  #dark-toggle:active { -webkit-transform: scale(0.88) rotate(20deg); transform: scale(0.88) rotate(20deg); }

  button { font-family: inherit; }
  svg { display: block; }

  /* ===== SVG DARK MODE ===== */
  .dark .svg-text { fill: #fff !important; }
  .dark .svg-subtext { fill: #8E8E93 !important; }
  .dark .svg-bg { fill: #1C1C1E !important; }

  /* ===== ANIMATIONS ===== */
  @-webkit-keyframes fadeInUp {
    from { opacity: 0; -webkit-transform: translateY(12px); transform: translateY(12px); }
    to { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @-webkit-keyframes scaleIn {
    from { opacity: 0; -webkit-transform: scale(0.94); transform: scale(0.94); }
    to { opacity: 1; -webkit-transform: scale(1); transform: scale(1); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
  }
  .page { -webkit-animation: fadeInUp 0.35s var(--ease-out) both; animation: fadeInUp 0.35s var(--ease-out) both; }
  .hero-card { -webkit-animation: scaleIn 0.4s var(--ease-out) 0.05s both; animation: scaleIn 0.4s var(--ease-out) 0.05s both; }
  .quick-card { -webkit-animation: fadeInUp 0.35s var(--ease-out) both; animation: fadeInUp 0.35s var(--ease-out) both; }
  .quick-card:nth-child(1) { -webkit-animation-delay: 0.05s; animation-delay: 0.05s; }
  .quick-card:nth-child(2) { -webkit-animation-delay: 0.08s; animation-delay: 0.08s; }
  .quick-card:nth-child(3) { -webkit-animation-delay: 0.11s; animation-delay: 0.11s; }
  .quick-card:nth-child(4) { -webkit-animation-delay: 0.14s; animation-delay: 0.14s; }
  .quick-card:nth-child(5) { -webkit-animation-delay: 0.17s; animation-delay: 0.17s; }
  .quick-card:nth-child(6) { -webkit-animation-delay: 0.20s; animation-delay: 0.20s; }

  /* ===== CONFIRM CARD ===== */
  .confirm-card {
    background: var(--card);
    border-radius: 18px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    margin-top: 24px;
  }
  .confirm-card .confirm-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .confirm-card .confirm-desc {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .confirm-link {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    text-align: center;
    text-decoration: none;
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    -webkit-transition: -webkit-transform 0.15s var(--spring), opacity 0.12s;
    transition: transform 0.15s var(--spring), opacity 0.12s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .confirm-link:active { -webkit-transform: scale(0.97); transform: scale(0.97); opacity: 0.85; }

  /* ===== iOS 17 FROSTED SEARCH BAR (unused but styled for future) ===== */
  .search-bar {
    background: rgba(118,118,128,0.12);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-bar input {
    background: none;
    border: none;
    font-size: 17px;
    color: var(--text);
    outline: none;
    width: 100%;
    font-family: inherit;
  }
  /* ===== QUIZ MODAL ===== */
  #form-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    -webkit-align-items: flex-end;
    align-items: flex-end;
    -webkit-justify-content: center;
    justify-content: center;
    padding: 0;
  }
  .modal-sheet {
    background: var(--card);
    border-radius: 22px 22px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 430px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    -webkit-animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @-webkit-keyframes slideUp {
    from { -webkit-transform: translateY(100%); transform: translateY(100%); }
    to { -webkit-transform: translateY(0); transform: translateY(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }

const meetings = [
  {id:1,title:"Pengantar Telaah Ilmiah",full:"Pengantar Telaah Ilmiah Epidemiologi",icon:"🔬",color:"#007AFF",intro:"Telaah ilmiah epidemiologi adalah proses kritis mengevaluasi bukti penelitian kesehatan untuk mendukung pengambilan keputusan berbasis bukti (Evidence-Based Practice).",sections:[{title:"Definisi & Ruang Lingkup",content:"Telaah Ilmiah (Critical Appraisal) adalah:\nProses sistematis untuk menilai validitas, relevansi, dan aplikabilitas hasil penelitian kesehatan.\n\nEpidemiologi adalah:\nStudi distribusi dan determinan kondisi kesehatan pada populasi untuk mengendalikan masalah kesehatan.\n\nRuang Lingkup:\n• Menilai kualitas metodologi penelitian\n• Memahami ukuran asosiasi dan kemaknaan statistik\n• Mengaplikasikan hasil penelitian ke praktik klinis/kesehatan masyarakat"},{title:"Hierarki Bukti Ilmiah",content:"Bukti ilmiah bertingkat dari yang paling lemah ke paling kuat:\n\n① Expert Opinion / Laporan Kasus (paling lemah)\n② Studi Cross-sectional / Ekologi\n③ Studi Kasus-Kontrol\n④ Studi Kohort\n⑤ Randomized Controlled Trial (RCT)\n⑥ Systematic Review & Meta-analisis (paling kuat)\n\nSemakin tinggi hierarki:\n• Semakin kuat mengendalikan bias\n• Semakin valid inferensi kausal\n• Semakin dapat digeneralisasi"},{title:"Evidence-Based Practice",content:"EBP mengintegrasikan tiga elemen:\n\n① Bukti penelitian terbaik (Best Research Evidence)\n② Keahlian klinis (Clinical Expertise)\n③ Nilai & preferensi pasien (Patient Values)\n\nLangkah EBP (5A):\n1. Ask — rumuskan pertanyaan klinis (PICO)\n2. Acquire — cari bukti terbaik\n3. Appraise — nilai kualitas bukti\n4. Apply — terapkan ke pasien\n5. Assess — evaluasi outcome\n\nFormat PICO:\nP: Population | I: Intervention\nC: Comparison | O: Outcome"},{title:"Prinsip Telaah Kritis",content:"Tiga pertanyaan utama telaah kritis:\n\n① VALIDITAS — Apakah hasil studi benar?\n• Apakah desain sesuai pertanyaan?\n• Apakah ada bias?\n• Apakah confounding dikendalikan?\n\n② KEPENTINGAN — Seberapa besar efeknya?\n• Ukuran efek: RR, OR, RD, NNT\n• Interval kepercayaan (95% CI)\n• Kemaknaan klinis vs statistik\n\n③ APLIKABILITAS — Apakah dapat diterapkan?\n• Karakteristik populasi studi vs pasien kita\n• Ketersediaan intervensi\n• Pertimbangan etis dan biaya"}]},
  {id:2,title:"Desain Penelitian",full:"Desain Penelitian Epidemiologi",icon:"🗂️",color:"#5856D6",intro:"Pemilihan desain penelitian yang tepat menentukan kualitas bukti yang dihasilkan dan kemampuan menjawab pertanyaan penelitian.",sections:[{title:"Klasifikasi Desain Penelitian",content:"Berdasarkan ada/tidaknya intervensi:\n\nOBSERVASIONAL — Peneliti hanya mengamati:\n• Deskriptif: case report, case series, cross-sectional, ekologi\n• Analitik: cohort, case-control, cross-sectional analitik\n\nEKSPERIMENTAL — Peneliti memberikan perlakuan:\n• RCT (Randomized Controlled Trial)\n• Quasi-eksperimen (tanpa randomisasi)\n• Community trial\n\nBerdasarkan waktu:\n• Retrospektif (ke masa lalu)\n• Prospektif (ke masa depan)\n• Cross-sectional (satu waktu)"},{title:"Studi Cross-Sectional",content:"Pengukuran paparan dan outcome BERSAMAAN:\n\nKelebihan:\n• Cepat dan murah\n• Dapat meneliti banyak faktor sekaligus\n• Baik untuk prevalens\n\nKekurangan:\n• Tidak bisa menentukan temporalitas\n• Rentan prevalence-incidence bias\n• Tidak bisa untuk penyakit langka\n\nAplikasi:\n• Survei kesehatan nasional (Riskesdas)\n• Screening program\n• Studi prevalens penyakit\n\nUkuran: Prevalens Ratio (PR), Odds Ratio (OR)"},{title:"Keunggulan & Keterbatasan RCT",content:"RCT — Standar Emas Penelitian Intervensi:\n\nKeunggulan:\n• Randomisasi mengeliminasi confounding\n• Dapat membuktikan kausalitas\n• Blinding mengurangi bias informasi\n• Internal validity tertinggi\n\nKeterbatasan:\n• Mahal dan lama\n• Etis: tidak bisa mengekspos risiko berbahaya\n• External validity terbatas (populasi selektif)\n• Tidak cocok untuk kondisi langka\n• Tidak cocok untuk faktor risiko permanen\n\nJenis Blinding:\n• Single blind: subjek tidak tahu\n• Double blind: subjek + peneliti tidak tahu\n• Triple blind: + analisis tidak tahu"},{title:"Memilih Desain yang Tepat",content:"Panduan memilih desain:\n\nPertanyaan → Desain\n\n\"Berapa prevalens DM di Aceh?\" → Cross-sectional\n\n\"Apakah merokok menyebabkan kanker paru?\" → Kohort (prospektif)\n\n\"Faktor risiko kanker serviks?\" → Kasus-Kontrol (penyakit langka)\n\n\"Apakah vaksin efektif mencegah COVID?\" → RCT\n\n\"Efek jangka panjang paparan pestisida?\" → Kohort\n\n\"Penyebab wabah keracunan makanan?\" → Kasus-Kontrol\n\nTips: Pertimbangkan waktu, dana, etika, dan kelangkaan penyakit."}]},
  {id:3,title:"Studi Deskriptif",full:"Epidemiologi Deskriptif: Person, Place, Time",icon:"📊",color:"#FF9500",intro:"Epidemiologi deskriptif menggambarkan distribusi penyakit menurut orang, tempat, dan waktu — fondasi setiap investigasi epidemiologis.",sections:[{title:"Person — Siapa yang Terkena?",content:"Karakteristik individu yang mempengaruhi risiko:\n\nDemografi:\n• Umur — faktor risiko paling konsisten (kurva J pada PTM)\n• Jenis kelamin — hormon, perilaku, pekerjaan\n• Ras/etnis — genetik, budaya, akses layanan\n\nSosial-Ekonomi:\n• Pendidikan — literasi kesehatan\n• Pekerjaan — paparan lingkungan kerja\n• Pendapatan — akses gizi dan layanan kesehatan\n\nPerilaku & Biologis:\n• Merokok, alkohol, diet, aktivitas fisik\n• Status imunisasi, riwayat penyakit\n• Faktor genetik/keturunan"},{title:"Place — Di Mana Terjadi?",content:"Distribusi geografis penyakit:\n\nSpatial Cluster:\n• Spot map: satu titik = satu kasus\n• Area map: choropleth berdasarkan wilayah\n\nTingkatan:\n• Internasional: perbedaan antar negara (DM — Pasifik tinggi)\n• Nasional: urban vs rural\n• Lokal: peta wabah (John Snow, London 1854)\n\nFaktor yang Mempengaruhi:\n• Lingkungan fisik: iklim, vektor, sumber air\n• Sosial: kepadatan penduduk, sanitasi\n• Pelayanan kesehatan: akses dan kualitas\n\nAlat: GIS (Geographic Information System)"},{title:"Time — Kapan Terjadi?",content:"Pola waktu penyakit:\n\n① Tren Sekuler (jangka panjang):\n• Perubahan insidens/prevalens selama puluhan tahun\n• Contoh: tren peningkatan obesitas global\n\n② Variasi Musiman (seasonal):\n• DBD meningkat musim hujan\n• ISPA meningkat musim pancaroba\n\n③ Variasi Siklus:\n• Wabah influenza setiap 2-3 tahun\n• Pandemi flu setiap 10-40 tahun\n\n④ Pola Epidemi (point source vs propagated):\n• Point source: kurva lonceng, sumber tunggal\n• Propagated: gelombang berulang, penularan orang-ke-orang\n\nKurva Epidemi membantu identifikasi masa inkubasi dan sumber penularan."},{title:"Angka & Ukuran dalam Epidemiologi Deskriptif",content:"Ukuran Frekuensi Dasar:\n\n• Rasio = a/b (tidak memerlukan hubungan)\n• Proporsi = a/(a+b) × 100% (bagian dari keseluruhan)\n• Rate = kejadian/waktu (mengandung dimensi waktu)\n\nAngka Penting:\n• CBR (Crude Birth Rate) = lahir hidup/1.000 penduduk\n• CDR (Crude Death Rate) = kematian/1.000 penduduk\n• IMR (Infant Mortality Rate) = kematian bayi/1.000 KH\n• MMR (Maternal Mortality Ratio) = kematian ibu/100.000 KH\n• CFR (Case Fatality Rate) = meninggal/kasus × 100%\n\nIndonesia 2023: IMR = 16,85/1.000 KH | MMR = 183/100.000 KH"}]},
  {id:4,title:"Studi Kohort",full:"Studi Kohort dan Ukuran Risiko",icon:"⏩",color:"#34C759",intro:"Studi kohort mengikuti kelompok terpapar dan tidak terpapar ke depan untuk membandingkan insidens outcome — desain terkuat untuk menentukan kausalitas setelah RCT.",sections:[{title:"Prinsip Dasar Studi Kohort",content:"Karakteristik Kohort:\n• Populasi yang diikuti dari awal (bebas outcome)\n• Dibedakan berdasarkan status paparan\n• Diikuti selama periode tertentu\n• Dicatat siapa yang mengembangkan outcome\n\nJenis Kohort:\n① Prospektif: paparan ditentukan sekarang, outcome diamati ke depan\n→ Lebih valid, mahal, lama\n\n② Retrospektif (historis): paparan dan outcome sudah terjadi, data dari rekam medis/database\n→ Lebih cepat, murah, tapi kualitas data terbatas\n\n③ Ambidirectional: kombinasi keduanya\n\nContoh Kohort Terkenal:\n• Framingham Heart Study (1948–kini): risiko kardiovaskular\n• Nurses Health Study: kanker dan gaya hidup"},{title:"Ukuran dalam Studi Kohort",content:"Risiko (Cumulative Incidence):\n= Kasus baru / Populasi awal\n\nInsiden Rate (Incidence Density):\n= Kasus baru / Total person-time\n\nRisiko Relatif (RR):\nRR = Insidens pada terpapar / Insidens pada tidak terpapar\n\nInterpretasi RR:\n• RR = 1 → tidak ada asosiasi\n• RR > 1 → faktor risiko (terpapar lebih berisiko)\n• RR < 1 → faktor protektif\n\nContoh:\nTerpapar: 50/1000 = 0.05\nTidak terpapar: 20/1000 = 0.02\nRR = 0.05/0.02 = 2.5\n→ Kelompok terpapar 2,5× lebih berisiko"},{title:"Risiko Atributable",content:"Risiko Atributable (Attributable Risk / RD):\nRD = Insidens E+ - Insidens E-\nRD = 0.05 - 0.02 = 0.03\n→ 3% kelebihan risiko akibat paparan\n\nFraksi Atributable pada terpapar (AF%):\nAF% = (RR-1)/RR × 100%\nAF% = (2.5-1)/2.5 × 100% = 60%\n→ 60% kasus pada terpapar dapat dicegah jika paparan dihilangkan\n\nFraksi Atributable Populasi (PAF%):\nPAF% = Pe × (RR-1) / [Pe × (RR-1) + 1] × 100%\nPe = proporsi terpapar di populasi\n\nPAF penting untuk prioritas kebijakan kesehatan masyarakat"},{title:"Kelebihan & Keterbatasan Kohort",content:"KELEBIHAN:\n• Temporal sequence jelas (paparan mendahului outcome)\n• Dapat menghitung insidens dan RR langsung\n• Dapat meneliti banyak outcome dari satu paparan\n• Baik untuk paparan langka\n• Mengurangi bias recall\n\nKETERBATASAN:\n• Mahal dan lama (prospektif)\n• Loss to follow-up — ancaman validitas\n• Tidak efisien untuk penyakit langka\n• Perubahan paparan selama follow-up sulit dikontrol\n• Healthy worker effect (bias seleksi)\n\nAtasi loss to follow-up:\n• Pertahankan kontak rutin\n• Buat partisipan tetap engaged\n• Lakukan analisis intention-to-treat"}]},
  {id:5,title:"Studi Kasus-Kontrol",full:"Studi Kasus-Kontrol dan Odds Ratio",icon:"🔁",color:"#FF2D55",intro:"Studi kasus-kontrol efisien untuk meneliti penyakit langka dengan menelusuri riwayat paparan dari masa lalu — desain pilihan untuk investigasi wabah.",sections:[{title:"Prinsip Dasar Kasus-Kontrol",content:"Dimulai dari OUTCOME (penyakit), bukan paparan:\n\n① Identifikasi kasus (penderita penyakit)\n② Pilih kontrol (tidak menderita penyakit)\n③ Telusuri riwayat paparan masa lalu\n④ Bandingkan proporsi terpapar antara kasus vs kontrol\n\nPemilihan Kasus:\n• Kasus insiden (baru) lebih baik dari kasus prevalen\n• Kriteria inklusi/eksklusi jelas\n• Konfirmasi diagnosis standar (ICD)\n\nPemilihan Kontrol:\n• Harus berasal dari populasi yang sama dengan kasus\n• Hospital control vs population control\n• Matching: umur, jenis kelamin, wilayah\n• Ratio kasus:kontrol optimal = 1:4 (untuk kasus langka)"},{title:"Odds Ratio (OR)",content:"Kenapa bukan RR? Pada kasus-kontrol, insidens TIDAK BISA dihitung langsung karena kita memilih berdasarkan outcome.\n\nSolusi: Odds Ratio (OR)\n\nOdds paparan pada kasus = a/c\nOdds paparan pada kontrol = b/d\n\nOR = (a/c) / (b/d) = (a×d) / (b×c)\n\nInterpretasi OR:\n• OR = 1 → tidak ada asosiasi\n• OR > 1 → faktor risiko\n• OR < 1 → faktor protektif\n\nOR ≈ RR jika prevalens penyakit rendah (<10%) — Rare Disease Assumption\n\nContoh:\na=80, b=40, c=20, d=60\nOR = (80×60)/(40×20) = 4800/800 = 6\n→ Kasus 6× lebih mungkin terpapar"},{title:"Matching dalam Kasus-Kontrol",content:"Matching: menyamakan variabel confounding antara kasus dan kontrol\n\nIndividual Matching: setiap kasus dipasangkan dengan 1+ kontrol berdasarkan karakteristik tertentu\n\nFrequency Matching: distribusi karakteristik kelompok kontrol disesuaikan dengan kasus\n\nKelebihan Matching:\n• Mengeliminasi confounding variabel yang di-match\n• Meningkatkan efisiensi statistik\n\nKeterbatasan Matching:\n• Variabel yang di-match tidak bisa dianalisis sebagai confounder\n• Overmatching: jika match pada intermediate variable\n• Lebih sulit menemukan kontrol\n\nAnalisis: Matched pairs harus dianalisis dengan Conditional Logistic Regression atau McNemar test"},{title:"Kelebihan & Keterbatasan",content:"KELEBIHAN:\n• Efisien untuk penyakit langka\n• Cepat dan murah\n• Dapat meneliti banyak faktor risiko\n• Baik untuk penyakit dengan masa laten panjang\n• Cocok untuk investigasi wabah (KLB)\n\nKETERBATASAN:\n• Tidak bisa hitung insidens dan RR langsung\n• Rentan bias recall (kasus lebih ingat paparan)\n• Rentan bias seleksi dalam pemilihan kontrol\n• Temporal sequence tidak selalu jelas\n• Tidak cocok untuk paparan langka\n\nBias Recall:\n• Kasus cenderung lebih mengingat/mencari penyebab\n• Atasi: validasi dengan biomarker atau rekam medis"}]},
  {id:6,title:"Ukuran Asosiasi",full:"Ukuran Asosiasi dan Tabel 2×2",icon:"📐",color:"#5856D6",intro:"Memahami tabel kontingensi 2×2 dan berbagai ukuran asosiasi adalah inti dari analisis epidemiologi — menentukan seberapa kuat hubungan paparan dengan penyakit.",sections:[{title:"Tabel 2×2 — Fondasi Analisis",content:"Tabel 2×2 merangkum hubungan paparan-penyakit:\n\n          Sakit(D+)  Sehat(D-)\nTerpapar(E+)   a         b\nTdk Terpapar(E-)  c      d\n\nMakna sel:\na = terpapar DAN sakit\nb = terpapar TIDAK sakit\nc = tidak terpapar DAN sakit\nd = tidak terpapar DAN tidak sakit\n\nTurunan:\na+b = total terpapar\nc+d = total tidak terpapar\na+c = total kasus\nb+d = total kontrol/sehat\nN = a+b+c+d = total sampel\n\nRumus kunci:\nInsidens E+ = a/(a+b)\nInsidens E- = c/(c+d)\nOdds E+ pada kasus = a/c\nOdds E+ pada kontrol = b/d"},{title:"Risiko Relatif & Odds Ratio",content:"RISIKO RELATIF (RR) — untuk kohort & cross-sectional:\nRR = [a/(a+b)] / [c/(c+d)]\n\nInterpretasi:\n• RR = 1 → tidak ada asosiasi\n• RR = 2 → 2× lebih berisiko pada kelompok terpapar\n• RR = 0.5 → 50% lebih protektif\n\nODDS RATIO (OR) — untuk kasus-kontrol:\nOR = (a×d) / (b×c)\n\nHubungan OR dan RR:\nOR ≈ RR jika prevalens penyakit rendah (<10%)\nOR selalu lebih ekstrem dari RR\n\nPREVALENS RATIO (PR) — untuk cross-sectional:\nPR = Prevalens E+ / Prevalens E-\nDirekomendasikan menggantikan OR pada cross-sectional"},{title:"Risiko Atributable & NNT",content:"PERBEDAAN RISIKO (RD / ARisk):\nRD = Insidens E+ - Insidens E-\n\nMAKNA: berapa kelebihan risiko akibat paparan\nRD positif → paparan berbahaya\nRD negatif → paparan protektif\n\nNUMBER NEEDED TO HARM (NNH):\nNNH = 1/RD\n→ Berapa orang terpapar agar 1 orang jadi sakit\n\nNUMBER NEEDED TO TREAT (NNT):\nNNT = 1/|RD|\n→ Berapa orang harus diintervensi agar 1 outcome dicegah\nNNT kecil = intervensi lebih efektif\n\nContoh:\nInsidens E+ = 0.12, E- = 0.04\nRD = 0.08\nNNH = 1/0.08 = 12.5 → setiap 13 orang terpapar, 1 menjadi sakit"},{title:"Interval Kepercayaan & Uji Hipotesis",content:"Interval Kepercayaan 95% (95% CI):\n• Rentang nilai yang dengan 95% kepercayaan mencakup nilai populasi sebenarnya\n• CI sempit = estimasi presisi tinggi (sampel besar)\n• CI lebar = estimasi presisi rendah (sampel kecil)\n\nInterpretasi CI pada RR/OR:\n• CI tidak mencakup 1.0 → signifikan secara statistik\n• CI mencakup 1.0 → tidak signifikan (H0 tidak ditolak)\n\nContoh:\nOR = 3.5, 95%CI: 2.1–5.8 → signifikan (tidak mencakup 1)\nOR = 1.8, 95%CI: 0.9–3.6 → tidak signifikan (mencakup 1)\n\np-value:\n• p < 0.05 → tolak H0 (konvensional)\n• p-value BUKAN ukuran kekuatan asosiasi!\n• Lebih utamakan CI dan ukuran efek\n\nKemaknaan klinis vs statistik harus dipertimbangkan bersama."}]},
  {id:7,title:"Insidens & Prevalens",full:"Ukuran Frekuensi: Insidens dan Prevalens",icon:"📈",color:"#FF9500",intro:"Insidens mengukur kasus BARU — dinamika penyakit. Prevalens mengukur beban total penyakit pada suatu waktu. Keduanya esensial untuk perencanaan kesehatan.",sections:[{title:"Insidens — Kasus Baru",content:"Insidens mengukur laju kemunculan kasus baru:\n\nCUMULATIVE INCIDENCE (CI) / RISIKO:\nCI = Kasus baru / Populasi awal (yang rentan)\nSatuan: proporsi (0–1) atau per 1.000 penduduk\nSyarat: populasi tertutup, periode waktu tetap\n\nINCIDENCE RATE (IR) / INCIDENCE DENSITY:\nIR = Kasus baru / Total person-time at risk\nSatuan: per 1.000 orang-tahun\nDigunakan jika ada loss to follow-up\n\nPerson-time:\n= waktu total semua subjek dalam risiko\nJika 100 orang diikuti 2 tahun = 200 orang-tahun\n\nContoh:\n15 kasus baru TB dalam 1000 orang selama 1 tahun\nCI = 15/1000 = 15‰\nIR = 15/950 orang-tahun = 15.8 per 1000 orang-tahun"},{title:"Prevalens — Beban Penyakit",content:"Prevalens mengukur proporsi kasus pada suatu waktu:\n\nPOINT PREVALENCE:\n= Kasus saat ini / Populasi total\nContoh: 200 penderita DM dari 10.000 penduduk\nPP = 200/10.000 = 2%\n\nPERIOD PREVALENCE:\n= Kasus selama periode / Populasi rata-rata\nMencakup kasus lama + baru dalam periode\n\nFaktor yang Meningkatkan Prevalens:\n• Insidens tinggi\n• Durasi penyakit panjang\n• Migrasi masuk penderita\n\nFaktor yang Menurunkan Prevalens:\n• Insidens rendah\n• Kematian tinggi\n• Kesembuhan cepat\n• Migrasi keluar penderita"},{title:"Hubungan Insidens & Prevalens",content:"Rumus Konversi (steady-state):\nP = I × D\n(Prevalens = Insidens × Durasi penyakit)\n\nImplikasi:\nJika insidens tetap tapi obat baru memperpanjang hidup penderita:\n→ PREVALENS meningkat meski insidens tidak berubah\n\nContoh: HIV di era ART\n• Insidens HIV tetap stabil\n• Durasi hidup ODHA meningkat drastis\n• Prevalens HIV meningkat\n\nPentingnya Membedakan Insidens vs Prevalens:\n• Insidens → untuk penelitian etiologi (kausal)\n• Prevalens → untuk perencanaan fasilitas dan kebutuhan layanan\n\nRatio Prevalens/Insidens ≈ Durasi rata-rata penyakit"},{title:"Angka Kematian & Morbiditas",content:"ANGKA KEMATIAN:\n• CFR = Kematian akibat penyakit X / Kasus penyakit X × 100%\n → Ukuran keparahan penyakit\n\n• IFR (Infection Fatality Rate) = meninggal / semua terinfeksi (termasuk tanpa gejala)\n\n• Standardisasi langsung: membandingkan CDR antar populasi berbeda umur\n → Gunakan populasi standar\n\nSECONDARY ATTACK RATE (SAR):\n= Kasus baru di antara kontak / Total kontak rentan × 100%\nMengukur kemudahan penularan dalam kelompok kontak\n\nREPRODUCTION NUMBER (R0):\nRata-rata kasus baru yang ditularkan dari 1 kasus\n• R0 > 1 → epidemi berlanjut\n• R0 < 1 → epidemi terkendali\n• R0 COVID-19 original strain ≈ 2.5–3"}]},
  {id:8,title:"UTS",full:"Ujian Tengah Semester",icon:"📝",color:"#AF52DE",isExam:true,intro:"UTS mencakup materi pertemuan 1–7 dengan penekanan pada pemahaman konsep dan kemampuan menghitung serta menginterpretasikan ukuran epidemiologi.",sections:[{title:"Cakupan Materi UTS",content:"Pertemuan 1 — Pengantar & Hierarki Bukti\n• Definisi telaah kritis, EBP, format PICO\n• Piramida bukti ilmiah\n\nPertemuan 2 — Desain Penelitian\n• Klasifikasi desain, RCT, cross-sectional\n\nPertemuan 3 — Epidemiologi Deskriptif\n• Person, Place, Time\n• Angka morbiditas dan mortalitas dasar\n\nPertemuan 4 — Studi Kohort\n• Prinsip, RR, Attributable Risk\n\nPertemuan 5 — Studi Kasus-Kontrol\n• Prinsip, OR, matching\n\nPertemuan 6 — Ukuran Asosiasi\n• Tabel 2×2, RR, OR, RD, NNT, CI\n\nPertemuan 7 — Insidens & Prevalens\n• CI, IR, Point/Period prevalence, P=I×D"},{title:"Format & Bobot Penilaian UTS",content:"PILIHAN GANDA — 25 soal (40%)\n• Definisi dan konsep dasar\n• Identifikasi desain penelitian\n• Interpretasi nilai RR, OR, CI\n\nESAI ANALITIS — 2 soal (30%)\n• Membandingkan kelebihan/keterbatasan desain\n• Menjelaskan hubungan insidens dan prevalens\n\nSTUDI KASUS — 1 kasus (30%)\n• Menghitung RR atau OR dari tabel 2×2\n• Menginterpretasikan hasil\n• Menyimpulkan asosiasi"},{title:"Contoh Soal Studi Kasus",content:"Sebuah penelitian mengikuti 500 perokok dan 500 bukan perokok selama 10 tahun. Hasilnya:\n• Perokok yang menderita kanker paru: 45 orang\n• Bukan perokok yang menderita kanker paru: 9 orang\n\nPertanyaan:\n(a) Desain penelitian apakah yang digunakan?\n(b) Hitung Insidens kumulatif masing-masing kelompok\n(c) Hitung RR dan interpretasikan\n(d) Hitung Attributable Risk\n(e) Berapa % kasus pada perokok yang dapat dicegah jika mereka berhenti merokok?\n\nJawaban:\n(a) Kohort prospektif\n(b) E+ = 45/500=0.09 | E- = 9/500=0.018\n(c) RR = 0.09/0.018 = 5.0 → perokok 5× berisiko\n(d) AR = 0.09-0.018 = 0.072 (7,2%)\n(e) AF% = (5-1)/5 × 100% = 80%"},{title:"🧪 Latihan Soal UTS — 20 Soal Pilihan Ganda",content:"__QUIZ_UTS__"}]},
  {id:9,title:"Kausalitas",full:"Teori Kausalitas dalam Epidemiologi",icon:"⚡",color:"#FF9500",intro:"Membuktikan hubungan kausal adalah tujuan utama epidemiologi — bukan sekadar asosiasi statistik. Kriteria Bradford Hill menjadi panduan utama.",sections:[{title:"Asosiasi vs Kausalitas",content:"Asosiasi statistik ≠ Kausalitas!\n\nJenis Asosiasi:\n\n① Asosiasi Artefak (palsu):\n• Akibat bias atau kesalahan pengukuran\n• Bukan hubungan nyata\n\n② Asosiasi Spurious (semu):\n• Akibat confounding\n• Keduanya dipengaruhi variabel ketiga\n• Contoh: sepatu ortopedis dengan harapan hidup panjang (sama-sama dipengaruhi umur)\n\n③ Asosiasi Kausal Tidak Langsung:\n• Melalui intermediate variable\n• Contoh: kemiskinan → gizi buruk → stunting\n\n④ Asosiasi KAUSAL (langsung):\n• Paparan menyebabkan outcome\n• Memenuhi kriteria Bradford Hill"},{title:"9 Kriteria Bradford Hill",content:"① Kekuatan Asosiasi (Strength)\nRR/OR besar → lebih mungkin kausal\nRR merokok-kanker paru = 9-10\n\n② Konsistensi (Consistency)\nDitemukan di berbagai studi, populasi, desain\n\n③ Spesifisitas (Specificity)\nSatu paparan → satu penyakit\n(kriteria ini paling lemah)\n\n④ Temporalitas (Temporality)\nPAPARAN mendahului OUTCOME\n→ Satu-satunya kriteria yang WAJIB!\n\n⑤ Gradien Biologis / Dosis-Respons\nSemakin besar dosis → semakin besar efek\n\n⑥ Plausibilitas Biologis\nMasuk akal secara mekanisme biologi\n\n⑦ Koherensi\nTidak bertentangan dengan pengetahuan yang ada\n\n⑧ Eksperimen\nAda bukti dari RCT atau quasi-eksperimen\n\n⑨ Analogi\nAda hubungan serupa yang sudah diakui"},{title:"Model Kausalitas Epidemiologi",content:"MODEL WEB OF CAUSATION (MacMahon):\n• Penyakit disebabkan jaringan faktor kompleks\n• Tidak ada penyebab tunggal\n• Intervensi pada titik manapun dapat mencegah penyakit\n\nMODEL SEGITIGA EPIDEMIOLOGI:\nHost ↔ Agent ↔ Environment\n• Penyakit terjadi jika ketiganya tidak seimbang\n• Intervensi: kendalikan agent, perkuat host, perbaiki lingkungan\n\nMODEL RODA:\n• Host di tengah (genetik)\n• Dikelilingi lingkungan (biologis, fisik, sosial)\n• Ukuran komponen mencerminkan kontribusi relatif\n\nSUFFICIENT-COMPONENT CAUSE MODEL (Rothman):\n• Sufficient cause: kombinasi komponen yang cukup\n• Necessary cause: komponen yang selalu ada"},{title:"Penerapan Kausalitas dalam Telaah Kritis",content:"Langkah Evaluasi Kausalitas dalam Telaah Jurnal:\n\n1. Tentukan apakah asosiasi nyata atau artefak?\n→ Nilai potensi bias dan confounding\n\n2. Apakah temporalitas terpenuhi?\n→ Cek desain penelitian\n\n3. Berapa kekuatan asosiasi?\n→ Hitung/cek RR, OR, beserta CI\n\n4. Apakah ada gradien dosis-respons?\n→ Cari data stratifikasi paparan\n\n5. Apakah konsisten dengan studi lain?\n→ Cari systematic review/meta-analisis\n\n6. Apakah plausibel secara biologis?\n→ Konsultasi literatur mekanisme\n\nCatatan: Tidak semua kriteria harus terpenuhi. Temporalitas adalah satu-satunya yang MUTLAK."}]},
  {id:10,title:"Surveilans Epidemiologi",full:"Surveilans Epidemiologi dan Sistem Informasi",icon:"📡",color:"#00C7BE",intro:"Surveilans adalah mata dan telinga sistem kesehatan — pemantauan berkelanjutan yang memungkinkan respons cepat terhadap ancaman kesehatan masyarakat.",sections:[{title:"Definisi & Tujuan Surveilans",content:"Definisi (CDC):\n'Pengumpulan, analisis, dan interpretasi data kesehatan yang berkelanjutan dan sistematis untuk perencanaan, implementasi, dan evaluasi program kesehatan masyarakat.'\n\nTujuan Surveilans:\n① Memantau tren penyakit\n② Mendeteksi KLB/wabah secara dini\n③ Identifikasi kelompok berisiko tinggi\n④ Mengevaluasi program intervensi\n⑤ Menginformasikan kebijakan kesehatan\n\nKarakteristik Surveilans yang Baik (CDC):\n• Sensitif: dapat mendeteksi kasus\n• Spesifik: tidak banyak false positive\n• Representatif: mewakili populasi\n• Tepat waktu: data cepat tersedia\n• Sederhana dan dapat diterima"},{title:"Jenis Surveilans",content:"Berdasarkan Metode Pengumpulan:\n\n① Surveilans Pasif:\n• Fasilitas kesehatan melaporkan kasus secara rutin\n• Murah, tidak membutuhkan banyak SDM\n• Kekurangan: underreporting\n\n② Surveilans Aktif:\n• Petugas aktif mencari kasus ke lapangan\n• Lebih akurat, mahal\n• Contoh: AFP surveillance (polio)\n\n③ Surveilans Sentinel:\n• Dipilih fasilitas sentinel tertentu\n• Data berkualitas tinggi dari lokasi representatif\n• Contoh: surveilans influenza sentinel\n\nBerdasarkan Cakupan:\n• Komprehensif: semua kasus wajib lapor\n• Sampel: hanya sebagian fasilitas\n\nSurveilans Berbasis Indikator vs Berbasis Kejadian (Event-based)"},{title:"Sistem Surveilans di Indonesia",content:"Sistem Kewaspadaan Dini & Respons (SKDR):\n• Pelaporan mingguan dari Puskesmas\n• 24 penyakit prioritas (DBD, ISPA, diare, dll)\n• Berbasis web: SKDR online\n• Alert jika kasus melebihi ambang batas\n\nSistem Surveilans Nasional:\n• SISMAL (Malaria)\n• SIHA (HIV/AIDS)\n• Surveilans TB — Aplikasi SITB\n• SKDR (26 penyakit menular)\n• Surveilans Gizi (e-PPGBM)\n\nIHR (International Health Regulations 2005):\n• Kewajiban pelaporan kejadian PHEIC\n• National Focal Point Indonesia: Kemenkes\n• Notifikasi WHO dalam 24-48 jam"},{title:"Investigasi KLB/Wabah",content:"10 Langkah Investigasi KLB:\n\n1. Konfirmasi diagnosis dan KLB\n2. Definisi kasus\n3. Temukan dan hitung kasus\n4. Orientasi data: Person, Place, Time\n5. Tentukan populasi berisiko\n6. Buat hipotesis\n7. Uji hipotesis (analitik)\n8. Kendalikan dan cegah\n9. Komunikasikan temuan\n10. Laporan akhir\n\nDefinisi Kasus dalam KLB:\n• Suspected: gejala klinis tanpa konfirmasi lab\n• Probable: gejala + epidemiologis\n• Confirmed: terkonfirmasi laboratorium\n\nR = kasus/ekspektasi\nJika R > 1 → ada peningkatan abnormal"}]},
  {id:11,title:"Epidemiologi PM",full:"Epidemiologi Penyakit Menular",icon:"🦠",color:"#FF3B30",intro:"Epidemiologi penyakit menular mempelajari dinamika penularan dan strategi memutus rantai infeksi — dasar pengendalian penyakit infeksi.",sections:[{title:"Rantai Penularan (Chain of Infection)",content:"6 Mata Rantai Penularan:\n\n① AGEN INFEKSIUS:\n• Bakteri: M. tuberculosis, Vibrio cholerae\n• Virus: HIV, SARS-CoV-2, dengue\n• Parasit: Plasmodium (malaria)\n• Karakteristik: infektivitas, patogenisitas, virulensi\n\n② RESERVOIR:\n• Manusia: tifoid, gonore\n• Hewan (zoonosis): rabies, brucellosis\n• Lingkungan: Legionella (air), C. tetani (tanah)\n\n③ PORTAL KELUAR:\n• Saluran napas: TBC, COVID-19\n• Saluran cerna: kolera, tifoid\n• Darah: HIV, hepatitis B\n\n④ MODA TRANSMISI:\n• Langsung: kontak, droplet, airborne\n• Tidak langsung: vehicle (air, makanan), vektor\n\n⑤ PORTAL MASUK: sesuai portal keluar\n\n⑥ HOST RENTAN: tidak imun, status gizi buruk"},{title:"Imunitas Kelompok (Herd Immunity)",content:"Herd Immunity Threshold (HIT):\nHIT = 1 - (1/R0)\n\nContoh:\n• Campak: R0=15, HIT=93%\n• COVID-19: R0=3, HIT=67%\n• Polio: R0=6, HIT=83%\n\nArtinya: herd immunity campak memerlukan ≥93% populasi imun\n\nCara Mencapai:\n① Vaksinasi massal\n② Infeksi alami (tidak dianjurkan)\n\nKonsekuensi jika HIT tidak tercapai:\n• Wabah dapat terjadi meski imunisasi ada\n• Kelompok rentan (bayi, immunocompromised) tidak terlindungi\n\nContoh Indonesia:\n• Program BIAN 2022: targetkan HIT campak\n• PIN Polio: eradikasi polio Indonesia"},{title:"Riwayat Alamiah & Tingkat Pencegahan",content:"RIWAYAT ALAMIAH PENYAKIT:\n\n① Tahap Kerentanan:\n• Belum terinfeksi\n• Pencegahan Primer: vaksinasi, higiene\n\n② Tahap Subklinis:\n• Terinfeksi tapi belum ada gejala (inkubasi)\n• Skrining & pencegahan sekunder\n\n③ Tahap Klinis:\n• Gejala muncul, diagnosis ditegakkan\n• Pengobatan untuk mencegah komplikasi\n\n④ Tahap Pemulihan/Kecacatan/Kematian:\n• Pencegahan Tersier: rehabilitasi\n\nTINGKAT PENCEGAHAN (Leavell & Clark):\n• Primordial: cegah munculnya faktor risiko (kebijakan)\n• Primer: cegah penyakit (vaksin, APD)\n• Sekunder: deteksi & obati dini\n• Tersier: rehabilitasi & cegah kekambuhan"},{title:"Penyakit Menular Prioritas Indonesia",content:"DBD (Demam Berdarah Dengue):\n• Vektor: Aedes aegypti\n• CFR Indonesia: <1% (target)\n• Program: PSN 3M Plus, Fogging\n\nTuberkulosis (TB):\n• Indonesia: peringkat 2 global\n• MDR-TB meningkat\n• Program: DOTS, SITB\n\nMalaria:\n• Target eliminasi 2030\n• Endemis di Papua, NTT\n• Program: SISMAL, kelambu berinsektisida\n\nHIV/AIDS:\n• Prevalens: ~0.4% dewasa\n• Transmisi: seksual > IDU\n• Program: ARV gratis, PPIA\n\nCOVID-19:\n• R0 original: 2.5–3\n• R0 Omicron: ~10\n• Lesson learned: pentingnya surveilans genomik"}]},
  {id:12,title:"Epidemiologi PTM & Skrining",full:"Epidemiologi Penyakit Tidak Menular dan Skrining",icon:"❤️‍🩹",color:"#FF2D55",intro:"PTM menyumbang 74% kematian global dan menjadi beban utama sistem kesehatan Indonesia — pencegahan melalui skrining dan modifikasi faktor risiko adalah kunci.",sections:[{title:"Epidemiologi PTM Global & Nasional",content:"4 PTM Utama (WHO):\n\n① Penyakit Kardiovaskular — 17.9 juta kematian/tahun\n② Kanker — 9.3 juta kematian/tahun\n③ Penyakit Pernapasan Kronik — 4.1 juta/tahun\n④ Diabetes Mellitus — 2 juta/tahun\n\nTotal: 41 juta kematian/tahun (74% kematian global)\n\nTransisi Epidemiologi Indonesia:\n• Tahun 1990: penyakit menular dominan\n• Tahun 2023: PTM sudah 70% penyebab kematian\n• Double burden: PM masih tinggi, PTM meningkat\n\nRiskesdas 2018 (Indonesia):\n• Hipertensi: 34.1%\n• DM: 8.5%\n• Obesitas sentral: 31%\n• Merokok >15 tahun: 33.8%"},{title:"Faktor Risiko PTM & Pencegahan",content:"4 Faktor Risiko Utama (WHO):\n\n① MEROKOK:\n• Menyebabkan 8 juta kematian/tahun global\n• Kanker paru, PPOK, kardiovaskular\n• Indonesia: 34% penduduk dewasa merokok\n\n② DIET TIDAK SEHAT:\n• Tinggi gula, lemak jenuh, garam\n• Rendah buah, sayur, serat\n\n③ INAKTIVITAS FISIK:\n• 3,2 juta kematian/tahun global\n• Rekomendasi: 150 menit/minggu aktivitas sedang\n\n④ PENGGUNAAN ALKOHOL:\n• Hepatitis alkoholik, sirosis, kanker\n\nPencegahan PTM (WHO):\n• Primordial: cegah timbulnya faktor risiko\n• Primer: kendalikan faktor risiko\n• Sekunder: deteksi dini (skrining)\n• Tersier: rehabilitasi, cegah komplikasi"},{title:"Skrining & Deteksi Dini",content:"Skrining: pengujian orang tanpa gejala untuk menemukan penyakit awal\n\nKriteria Wilson & Jungner untuk Program Skrining:\n• Penyakit penting bagi kesehatan masyarakat\n• Perjalanan penyakit dipahami\n• Ada stadium dini yang dapat dideteksi\n• Ada tes skrining yang valid\n• Ada pengobatan yang efektif\n• Fasilitas diagnosis dan terapi tersedia\n• Biaya skrining sepadan\n\nUkuran Validitas Tes Skrining:\n• Sensitivitas = a/(a+c) → kemampuan deteksi sakit\n• Spesifisitas = d/(b+d) → kemampuan identifikasi sehat\n• PPV: jika tes positif, peluang benar sakit\n• NPV: jika tes negatif, peluang benar sehat\n\nProgram Skrining Indonesia:\n• IVA test (kanker serviks)\n• Skrining DM & hipertensi di Posbindu\n• Mammografi (kanker payudara)"},{title:"Beban PTM di Indonesia",content:"Data Riskesdas 2018:\n• Hipertensi: 34.1% (naik dari 25.8% di 2013)\n• DM: 8.5% (naik dari 6.9%)\n• Stroke: 10.9/1.000 penduduk\n• Kanker: 1.79/1.000 penduduk\n• PPOK: 3.7/1.000 penduduk ≥15 tahun\n\nBiaya Katastropik BPJS 2022:\n• Penyakit jantung: Rp 9.87 triliun (terbesar)\n• Kanker: Rp 3.6 triliun\n• Stroke: Rp 2.8 triliun\n• Gagal ginjal: Rp 2.5 triliun\n\nStrategi PJPT (Pencegahan dan Pengendalian PTM):\n• Germas (Gerakan Masyarakat Hidup Sehat)\n• Posbindu PTM\n• Skrining faktor risiko 15 penyakit\n• Penguatan layanan primer"}]},
  {id:13,title:"Bias & Confounding",full:"Bias, Confounding, dan Pengendaliannya",icon:"⚖️",color:"#5856D6",intro:"Bias dan confounding adalah ancaman utama validitas penelitian epidemiologi. Mengenal dan mengendalikannya adalah kunci telaah kritis yang baik.",sections:[{title:"Bias Seleksi",content:"Bias Seleksi terjadi saat subjek terpilih tidak representatif:\n\nJenis Bias Seleksi:\n\n① Volunteer Bias / Healthy Worker Effect:\n• Orang yang bersedia ikut penelitian lebih sehat\n• Umum pada studi kohort pekerja\n\n② Berkson's Bias:\n• Pasien rumah sakit tidak mewakili populasi umum\n• Umum pada kasus-kontrol berbasis RS\n\n③ Neyman/Prevalence-Incidence Bias:\n• Kasus fatal cepat meninggal, tidak sempat masuk studi\n• Kasus ringan tidak terdeteksi\n• Prevalens kasus yang tersisa ≠ semua kasus\n\n④ Loss to Follow-up Bias:\n• Yang drop out berbeda dari yang bertahan\n• Ancaman utama studi kohort\n\nPengendalian:\n• Desain yang baik (kriteria inklusi/eksklusi jelas)\n• Minimalisasi loss to follow-up"},{title:"Bias Informasi",content:"Bias Informasi terjadi saat pengukuran tidak akurat:\n\n① Recall Bias:\n• Kasus lebih mengingat paparan (mereka mencari penyebab)\n• Lebih umum pada kasus-kontrol\n• Atasi: validasi dengan biomarker/rekam medis\n\n② Observer Bias:\n• Peneliti yang tahu hipotesis mempengaruhi pencatatan\n• Atasi: blinding penilai\n\n③ Interviewer Bias:\n• Pewawancara lebih dalam menggali pada kelompok tertentu\n• Atasi: strukturkan pertanyaan, latih pewawancara\n\n④ Misclassification Bias:\n• Non-differential: kesalahan merata di semua kelompok\n → Hasil bias menuju null (RR/OR mendekati 1)\n• Differential: kesalahan lebih pada satu kelompok\n → Dapat membiaskan ke segala arah\n\n⑤ Hawthorne Effect:\n• Perilaku berubah karena sadar diamati"},{title:"Confounding",content:"Confounder adalah variabel yang:\n① Berhubungan dengan paparan\n② Berhubungan dengan outcome\n③ Bukan intermediate variable\n\nContoh Klasik:\n• Penelitian: hubungan minum kopi dengan kanker pankreas\n• Hasil: OR=2.5\n• Confounding: perokok lebih sering minum kopi\n• Merokok adalah confounder\n• Setelah adjusted: OR=1.2 (tidak signifikan)\n\nCara Identifikasi Confounder:\n• Cek bivariate association\n• Bandingkan crude RR vs adjusted RR\n• Jika berbeda ≥10-15%: confounding ada\n\nPengendalian Confounding:\nSaat DESAIN:\n• Randomisasi (terbaik)\n• Restriksi (batasi studi pada satu kategori)\n• Matching\n\nSaat ANALISIS:\n• Stratifikasi (Mantel-Haenszel)\n• Regresi logistik / Cox regression\n• Propensity score matching"},{title:"Evaluasi Bias dalam Telaah Jurnal",content:"Daftar Pertanyaan Telaah Kritis untuk Bias:\n\nBias Seleksi:\n• Bagaimana kasus dan kontrol dipilih?\n• Apakah ada perbedaan sistematis antara yang ikut dan tidak ikut?\n• Berapa % loss to follow-up?\n\nBias Informasi:\n• Bagaimana paparan diukur?\n• Apakah pengukuran sama di semua kelompok?\n• Apakah peneliti mengetahui status paparan saat menilai outcome?\n\nConfounding:\n• Apakah peneliti mengidentifikasi confounding potensial?\n• Apakah confounding dikendalikan dalam analisis?\n• Berapa perbedaan crude vs adjusted estimate?\n\nAlat Telaah Kritis Standar:\n• STROBE (observasional)\n• CONSORT (RCT)\n• PRISMA (systematic review)\n• GRADE (kualitas bukti keseluruhan)"}]},
  {id:14,title:"Systematic Review",full:"Systematic Review dan Meta-analisis",icon:"🔎",color:"#34C759",intro:"Systematic review dan meta-analisis berada di puncak hierarki bukti — mensintesis seluruh bukti yang ada untuk menjawab pertanyaan klinis secara komprehensif.",sections:[{title:"Systematic Review vs Literature Review",content:"LITERATURE REVIEW (Naratif):\n• Tidak sistematis — peneliti memilih studi subjektif\n• Rentan bias publikasi dan seleksi\n• Tidak ada protokol yang terdaftar\n• Tidak dapat direplikasi\n\nSYSTEMATIC REVIEW:\n• Protokol terdaftar (PROSPERO)\n• Pencarian komprehensif dan transparan\n• Kriteria inklusi/eksklusi eksplisit\n• Penilaian kualitas studi (risk of bias)\n• Dapat direplikasi\n\nMETA-ANALISIS:\n• Pooling statistik dari beberapa studi\n• Menghasilkan satu estimasi gabungan\n• Tidak semua SR melakukan meta-analisis\n• Syarat: studi cukup homogen\n\nLangkah SR:\n① PICO → ② Protokol PROSPERO → ③ Pencarian → ④ Skrining → ⑤ Ekstraksi → ⑥ Penilaian bias → ⑦ Sintesis → ⑧ GRADE"},{title:"Alur PRISMA",content:"PRISMA (Preferred Reporting Items for Systematic Reviews):\n\nFASE IDENTIFIKASI:\n• Cari di multiple database: PubMed, Scopus, Embase, Cochrane\n• Grey literature: WHO, CDC, thesis\n• Reference list dari artikel relevan\n• Catat total semua artikel ditemukan\n\nFASE SKRINING:\n• Hapus duplikat\n• Skrining judul dan abstrak\n• Terapkan kriteria inklusi/eksklusi\n• Dua reviewer independen → kappa agreement\n\nFASE KELAYAKAN:\n• Baca full-text\n• Eksklusi dengan alasan yang dicatat\n\nFASE INCLUDED:\n• Studi yang memenuhi semua kriteria\n• Lakukan ekstraksi data\n• Nilai risk of bias\n\nDiagram PRISMA: visualisasi alur dengan jumlah di setiap tahap"},{title:"Heterogenitas & Forest Plot",content:"Heterogenitas: variasi hasil antar studi\n\nUkuran Heterogenitas:\n• Cochran's Q test: p<0.1 → heterogen\n• I² statistik:\n  - 0-25%: heterogenitas rendah\n  - 25-75%: sedang\n  - >75%: tinggi — meta-analisis dipertanyakan\n\nModel Pooling:\n• Fixed Effect: semua studi estimasi efek sama\n• Random Effect: efek berbeda antar studi → lebih konservatif (CI lebih lebar)\n\nFOREST PLOT:\n• Setiap baris = satu studi\n• Kotak = estimasi efek, ukuran ∝ bobot studi\n• Garis horizontal = 95% CI\n• Berlian di bawah = pooled estimate\n• Garis vertikal: null line (RR=1 atau MD=0)\n• Jika 95% CI tidak melewati null: signifikan\n\nFUNNEL PLOT: mendeteksi bias publikasi"},{title:"Penilaian Kualitas Bukti (GRADE)",content:"GRADE: Grading of Recommendations Assessment, Development and Evaluation\n\nLevel Kualitas Bukti:\n🔴 Sangat Rendah: RCT dengan downgrade banyak, atau observasional\n🟠 Rendah: RCT dengan downgrade, atau observasional upgrded\n🟡 Sedang: RCT dengan beberapa downgrade\n🟢 Tinggi: RCT tanpa downgrade, atau observasional sangat konsisten\n\nFaktor Downgrade (menurunkan kualitas):\n• Risk of bias tinggi\n• Inkonsistensi antar studi\n• Indirectness (populasi/intervensi berbeda)\n• Imprecision (CI lebar)\n• Bias publikasi\n\nFaktor Upgrade (meningkatkan kualitas observasional):\n• Efek sangat besar (RR>2 atau <0.5)\n• Gradien dosis-respons jelas\n• Confounding justru melemahkan efek nyata\n\nAplikasi: Pedoman klinis WHO, IDAI, PERKENI"}]},
  {id:15,title:"Studi Kasus Telaah",full:"Studi Kasus Telaah Ilmiah Epidemiologi",icon:"🏥",color:"#FF2D55",intro:"Penerapan seluruh konsep telaah kritis pada jurnal penelitian nyata — dari membaca PICO hingga menilai validitas, kepentingan, dan aplikabilitas.",sections:[{title:"Membaca Jurnal Secara Kritis",content:"Struktur Jurnal Ilmiah:\n\nJUDUL & ABSTRAK:\n• Identifikasi desain penelitian\n• Tentukan PICO\n• Catat hasil utama dan kesimpulan\n\nPENDAHULUAN:\n• Apa pertanyaan penelitian?\n• Apakah didukung literatur?\n\nMETODE:\n• Desain: apakah sesuai pertanyaan?\n• Populasi: siapa dan dari mana?\n• Pengukuran: valid dan reliable?\n• Analisis: apakah tepat?\n\nHASIL:\n• Tabel baseline: apakah kelompok sebanding?\n• Ukuran efek dan CI\n• Missing data: berapa banyak?\n\nDISKUSI:\n• Apakah bias diakui?\n• Apakah kesimpulan sesuai data?\n• Generalisabilitas?"},{title:"Checklist Telaah Jurnal Kohort (STROBE)",content:"Penilaian Validitas Internal:\n\nSELEKSI:\n□ Apakah sumber dan metode seleksi subjek dijelaskan?\n□ Apakah ada perbedaan antara yang ikut dan tidak?\n□ Berapa % loss to follow-up?\n□ Apakah analisis sensitivitas dilakukan?\n\nKOMPARABILITAS:\n□ Apakah karakteristik baseline sebanding?\n□ Apakah confounding diidentifikasi?\n□ Apakah analisis adjusted dilaporkan?\n\nOUTCOME:\n□ Apakah outcome didefinisikan jelas?\n□ Apakah outcome diukur sama di semua kelompok?\n□ Apakah follow-up cukup panjang?\n\nHASIL:\n□ Apakah jumlah peserta per analisis dilaporkan?\n□ Apakah dilaporkan absolute risk, bukan hanya RR?\n□ Apakah CI dilaporkan untuk semua estimasi?"},{title:"Studi Kasus: Merokok dan Kanker Paru",content:"Jurnal: Doll & Hill, 1950 (British Medical Journal)\nDesain: Kasus-Kontrol\n\nMetode:\n• 1.465 kasus kanker paru di RS London\n• 1.465 kontrol dari bangsal lain\n• Wawancara riwayat merokok\n\nHasil:\n• Perokok pada kasus: 96.6%\n• Perokok pada kontrol: 85.7%\n• OR = (1407×204) / (58×1261) = 3.9\n\nTelaah Kritis:\n✅ Temporalitas: merokok sebelum kanker\n✅ Kekuatan asosiasi: OR=3.9\n✅ Konsisten: direplikasi berkali-kali\n✅ Dosis-respons: perokok berat OR lebih tinggi\n\n⚠️ Bias recall: kasus mungkin lebih ingat merokok\n⚠️ Hospital control: Berkson's bias?\n\nKesimpulan: Bukti kuat faktor risiko (asosiasi kausal)"},{title:"Latihan Telaah Mandiri",content:"Langkah Telaah Jurnal Mandiri:\n\n1. VALIDITAS:\n□ Apakah desain sesuai pertanyaan?\n□ Apakah bias seleksi mungkin ada?\n□ Apakah bias informasi mungkin ada?\n□ Apakah confounding dikendalikan?\n\n2. KEPENTINGAN:\n□ Berapa nilai RR, OR, atau MD?\n□ Berapa 95% CI?\n□ Apakah CI melewati null?\n□ Berapa NNT atau NNH?\n\n3. APLIKABILITAS:\n□ Apakah populasi studi mirip pasien/masyarakat kita?\n□ Apakah intervensi tersedia di konteks kita?\n□ Apakah manfaat lebih besar dari bahaya?\n□ Apa nilai dan preferensi masyarakat?\n\nSumber Jurnal Gratis:\n• PubMed Central (PMC)\n• Cochrane Library\n• WHO IRIS\n• Litbang Kemenkes RI\n• Google Scholar"}]},
  {id:16,title:"UAS",full:"Ujian Akhir Semester",icon:"🏆",color:"#FF9500",isExam:true,intro:"UAS menguji pemahaman komprehensif seluruh materi telaah ilmiah epidemiologi dengan penekanan pada kemampuan aplikasi dan analisis kritis.",sections:[{title:"Cakupan Materi UAS",content:"Materi UTS (30%):\n• Telaah kritis, hierarki bukti, PICO\n• Desain penelitian, epidemiologi deskriptif\n• Kohort, kasus-kontrol, ukuran asosiasi\n• Insidens dan prevalens\n\nMateri Pasca-UTS (70%):\n• Kausalitas (Bradford Hill)\n• Surveilans epidemiologi\n• Epidemiologi penyakit menular\n• Epidemiologi PTM dan skrining\n• Bias dan confounding\n• Systematic review dan meta-analisis\n• Studi kasus telaah jurnal"},{title:"Format Penilaian UAS",content:"PILIHAN GANDA — 25 soal (25%)\n• Konsep, definisi, interpretasi nilai\n• Identifikasi jenis bias\n• Kriteria Bradford Hill\n\nESAI ANALITIS — 3 soal (35%)\n• Jelaskan perbedaan SR dan literature review\n• Interpretasi forest plot\n• Evaluasi strategi pengendalian confounding\n\nTELAAH JURNAL KOMPREHENSIF — 1 jurnal (40%)\n• Jurnal diberikan saat ujian\n• Identifikasi PICO\n• Nilai validitas (bias dan confounding)\n• Interpretasi ukuran asosiasi dan CI\n• Nilai aplikabilitas hasil"},{title:"Contoh Soal Telaah Jurnal",content:"Jurnal: 'Hubungan Konsumsi Makanan Tinggi Garam dengan Hipertensi pada Usia 40-60 tahun di Kab. Bireuen'\nDesain: Cross-sectional\n\nHasil: PR = 2.3, 95%CI: 1.5–3.6, p=0.001\n\nPertanyaan:\n(a) Identifikasi PICO penelitian ini (10p)\n(b) Mengapa menggunakan PR, bukan OR? (10p)\n(c) Interpretasikan PR dan CI (15p)\n(d) Bias apa yang mungkin ada? Jelaskan! (20p)\n(e) Apakah temporalitas terpenuhi? (10p)\n(f) Apakah hasil dapat diterapkan di Pidie Jaya? (15p)\n(g) Sebutkan 3 kriteria Bradford Hill yang terpenuhi (20p)"},{title:"Penilaian Akhir & Tips Sukses",content:"Nilai Akhir:\nUAS 40% + UTS 30% + Tugas 20% + Kehadiran 10%\n\nGrade:\nA ≥81 | B 66-80 | C 56-65 | D 41-55 | E <41\n\nLulus minimal: C (56-65)\n\nTips Sukses UAS:\n\n① Kuasai tabel 2×2 → hitung RR, OR, CI\n\n② Hafal format PICO dan 9 Kriteria Bradford Hill\n\n③ Latihan baca dan telaah jurnal nyata\n\n④ Bedakan: bias seleksi vs bias informasi vs confounding\n\n⑤ Pahami perbedaan SR vs meta-analisis vs narrative review\n\n⑥ Latihan interpretasi forest plot dan nilai I²\n\n⑦ Selalu hubungkan ke konteks kesehatan Indonesia\n\nBismillah — semoga sukses! 🤲"},{title:"🏆 Latihan Soal UAS — 20 Soal Pilihan Ganda",content:"__QUIZ_UAS__"}]}
];

let dark=false, currentTab='home', selM=null, selS=null, readState={};
let quizState=null; // {answers:[], submitted:false, nama:'', nim:'', email:''}

function toggleRead(mid,sid){const k=`${mid}-${sid}`;readState[k]=!readState[k];render();}
function isRead(mid,sid){return !!readState[`${mid}-${sid}`];}
function getProgress(mid){const m=meetings.find(x=>x.id===mid);if(!m)return 0;const d=m.sections.filter((_,i)=>readState[`${mid}-${i}`]).length;return Math.round((d/m.sections.length)*100);}
function totalProgress(){let t=0,d=0;meetings.forEach(m=>m.sections.forEach((_,i)=>{t++;if(readState[`${m.id}-${i}`])d++;}));return t>0?Math.round((d/t)*100):0;}

function progressRingSVG(pct,size,stroke,color){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--sep)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central" fill="var(--text)" font-size="${size*0.26}" font-weight="800" letter-spacing="-0.02em" style="transform:rotate(90deg);transform-box:fill-box;transform-origin:center">${pct}%</text>
  </svg>`;}

function chevSVG(){return `<svg class="chev" width="8" height="14" viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="var(--text-muted)" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>`;}
function backSVG(){return `<svg width="10" height="16" viewBox="0 0 10 16"><path d="M8.5 1L1.5 8l7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`;}

function renderHome(){
  const tp=totalProgress();
  const qCards=meetings.slice(0,6).map(m=>{const p=getProgress(m.id);return `<div class="quick-card" onclick="openMeeting(${m.id})"><div style="font-size:30px;margin-bottom:8px">${m.icon}</div><div style="font-size:11px;color:${m.color};font-weight:700;margin-bottom:2px;letter-spacing:0.02em">P${m.id}</div><div style="font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:10px;letter-spacing:-0.01em">${m.title}</div><div class="prog-bar-bg"><div class="prog-bar-fill" style="background:${m.color};width:${p}%"></div></div></div>`;}).join('');
  const infoRows=[{l:"Institusi",v:"UMMAH",i:"🏛️"},{l:"Total Pertemuan",v:"16",i:"📅"},{l:"Evaluasi",v:"UTS + UAS",i:"📝"},{l:"Acuan",v:"EBP & Bradford Hill",i:"📖"}];
  const infoHTML=infoRows.map((x,i)=>`<div class="info-row" style="${i===3?'border-bottom:none':''}"><span style="font-size:24px;margin-right:14px">${x.i}</span><span class="info-label">${x.l}</span><span class="info-val">${x.v}</span></div>`).join('');
  const msg=tp===0?"Mulai perjalananmu!":tp===100?"Semua selesai! 🎉":`${tp}% materi dipelajari`;
  return `<div class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div><h1 style="font-size:28px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-0.02em">Telaah Ilmiah</h1><p style="font-size:14px;color:var(--text-muted);margin-top:4px;font-weight:500">Epidemiologi — UMMAH</p></div>
      <button id="dark-toggle" onclick="toggleDark()">${dark?"☀️":"🌙"}</button>
    </div>
    <div class="hero-card">${progressRingSVG(tp,68,5,"#34C759")}<div style="position:relative;z-index:1"><div style="font-size:20px;font-weight:800;letter-spacing:-0.02em">Progres Belajar</div><div style="font-size:14px;opacity:0.75;margin-top:4px;font-weight:500">${msg}</div></div></div>
    <div class="section-label">Lanjutkan Belajar</div>
    <div class="quick-scroll">${qCards}</div>
    <div class="section-label">Tentang Mata Kuliah</div>
    <div class="card">${infoHTML}</div>
  </div>`;}

function renderMateri(){
  const rows=meetings.map((m,i)=>{const p=getProgress(m.id);const ring=p>0?progressRingSVG(p,32,2.5,p===100?"#34C759":m.color):'';
  return `<div class="list-item" onclick="openMeeting(${m.id})" style="${i===meetings.length-1?'border-bottom:none':''}"><div style="width:44px;height:44px;border-radius:13px;margin-right:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:${m.color}15">${m.icon}</div><div style="flex:1;min-width:0"><div style="font-size:11px;color:${m.isExam?"#AF52DE":m.color};font-weight:700;letter-spacing:0.02em">Pertemuan ${m.id}${m.isExam?" • Evaluasi":""}</div><div style="font-size:16px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em">${m.title}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${ring}${chevSVG()}</div></div>`;}).join('');
  return `<div class="page"><h1 class="page-title">Materi</h1><div class="card">${rows}</div></div>`;}

function renderProgress(){
  const tp=totalProgress(),done=meetings.filter(m=>getProgress(m.id)===100).length;
  const list=meetings.map(m=>{const p=getProgress(m.id);return `<div class="prog-list-item"><span style="font-size:22px">${m.icon}</span><div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.01em">P${m.id}. ${m.title}</div><div class="prog-bar-bg thick" style="margin-top:8px"><div class="prog-bar-fill" style="background:${p===100?"#34C759":m.color};width:${p}%"></div></div></div><span style="font-size:14px;font-weight:700;color:${p===100?"#34C759":"var(--text-muted)"}">${p}%</span></div>`;}).join('');
  return `<div class="page"><h1 class="page-title">Progres</h1><div class="prog-center">${progressRingSVG(tp,130,9,"#34C759")}</div><div class="stat-grid"><div class="stat-card"><div class="stat-num" style="color:#34C759">${done}</div><div class="stat-label">Selesai</div><div class="stat-sub">dari 16</div></div><div class="stat-card"><div class="stat-num" style="color:#FF9500">${16-done}</div><div class="stat-label">Sisa</div><div class="stat-sub">lagi</div></div></div><div>${list}</div></div>`;}
