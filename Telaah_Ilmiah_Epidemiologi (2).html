  const p=getProgress(m.id);
  const secHTML=m.sections.map((sec,i)=>{const d=isRead(m.id,i);return `<div class="section-row" onclick="openSection(${m.id},${i})" style="${i===m.sections.length-1?'border-bottom:none':''}"><div class="section-num" style="background:${d?"#34C759":m.color+"15"};color:${d?"#fff":m.color}">${d?"✓":i+1}</div><div class="section-title-text">${sec.title}</div>${chevSVG()}</div>`;}).join('');
  const visualHTML = visuals[m.id] ? `<div class="visual-card"><div class="visual-card-title">📊 Visualisasi Konsep</div>${visuals[m.id]}</div>` : '';
  return `<div>
    <div class="back-row"><button class="back-btn" onclick="goBack('materi')">${backSVG()} Materi</button></div>
    <div class="page" style="padding-top:0">
      <div class="meeting-header" style="background:linear-gradient(145deg,${m.color},${m.color}BB)">
        <div class="m-icon">${m.icon}</div>
        <div class="m-sub">Pertemuan ${m.id}${m.isExam?" • Evaluasi":""}</div>
        <h2>${m.full}</h2>
        <div class="meeting-prog-bg"><div class="meeting-prog-fill" style="width:${p}%"></div></div>
        <div class="meeting-prog-pct">${p}% selesai</div>
      </div>
      <div class="meeting-intro">${m.intro}</div>
      ${visualHTML}
      <div class="section-label" style="margin-bottom:8px">Materi Pembahasan</div>
      <div class="card">${secHTML}</div>
      <div class="confirm-card">
        <div class="confirm-title">✅ Sudah selesai membaca?</div>
        <div class="confirm-desc">Klik tombol di bawah untuk mengirim konfirmasi kehadiran baca kepada dosen.</div>
        <a href="${buildFormURL(m)}" target="_blank" rel="noopener" class="confirm-link" style="background:${m.color}">📋 Kirim Konfirmasi ke Dosen</a>
      </div>
    </div>
  </div>`;}

// ============================================================
// RENDER SECTION DETAIL — routes to quiz if needed
// ============================================================
function renderSectionDetail(m,si){
  const sec=m.sections[si];
  if(sec&&sec.content==='__QUIZ_UTS__') return renderQuizSection(m,si,'UTS');
  if(sec&&sec.content==='__QUIZ_UAS__') return renderQuizSection(m,si,'UAS');
  return renderSectionDetailOrig(m,si);
}
function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================
// RENDER SECTION DETAIL — with QUIZ support
// ============================================================
function renderSectionDetailOrig(m,si){
  const sec=m.sections[si],done=isRead(m.id,si);
  const btnStyle=done?`background:var(--sep);color:var(--text-muted)`:`background:${m.color};color:#fff`;
  const nextBtn=si<m.sections.length-1?`<button class="next-btn" onclick="openSection(${m.id},${si+1})">Materi Selanjutnya →</button>`:'';
  return `<div>
    <div class="back-row"><button class="back-btn" onclick="goBackToMeeting(${m.id})">${backSVG()} Kembali</button></div>
    <div class="page" style="padding-top:0">
      <div class="pertemuan-badge" style="background:${m.color}15;color:${m.color}">Pertemuan ${m.id}</div>
      <h2 style="font-size:26px;font-weight:800;color:var(--text);line-height:1.15;margin-bottom:20px;letter-spacing:-0.02em">${sec.title}</h2>
      <div class="section-content-box">${escHTML(sec.content)}</div>
      <button class="mark-btn" style="${btnStyle}" onclick="toggleRead(${m.id},${si})">${done?"✓ Sudah Dibaca":"Tandai Sudah Dibaca"}</button>
      ${nextBtn}
    </div>
  </div>`;}

// ============================================================
// QUIZ FUNCTIONS
// ============================================================
function startQuiz(type){
  quizState={answers:Array(type==='UAS'?soalUAS.length:soalUTS.length).fill(null),submitted:false,nama:'',nim:'',email:'',type:type||'UTS'};
  render();
}
function selectAnswer(qi,oi){
  if(quizState&&!quizState.submitted){quizState.answers[qi]=oi;render();}
}
function submitQuiz(){
  if(!quizState)return;
  const nama=document.getElementById('q-nama')?document.getElementById('q-nama').value.trim():'';
  const nim=document.getElementById('q-nim')?document.getElementById('q-nim').value.trim():'';
  const email=document.getElementById('q-email')?document.getElementById('q-email').value.trim():'';
  if(!nama||!nim||!email){alert('Lengkapi Nama, NIM, dan Email terlebih dahulu!');return;}
  const soalArr=quizState.type==='UAS'?soalUAS:soalUTS;
  const unanswered=quizState.answers.filter(a=>a===null).length;
  if(unanswered>0){if(!confirm(`Masih ada ${unanswered} soal belum dijawab. Kirim sekarang?`))return;}
  quizState.nama=nama;quizState.nim=nim;quizState.email=email;
  quizState.submitted=true;
  render();
  setTimeout(()=>sendToGoogleForms(),300);
}
function getScore(){
  if(!quizState)return 0;
  const soalArr=quizState.type==='UAS'?soalUAS:soalUTS;
  return quizState.answers.reduce((s,a,i)=>s+(a===soalArr[i].jawaban?1:0),0);
}
function sendToGoogleForms(){
  const soalArr=quizState.type==='UAS'?soalUAS:soalUTS;
  const skor=getScore();
  const total=soalArr.length;
  const pct=Math.round((skor/total)*100);
  const grade=pct>=81?'A':pct>=66?'B':pct>=56?'C':pct>=41?'D':'E';
  const label=quizState.type==='UAS'?'UAS':'UTS';
  const pertemuan=quizState.type==='UAS'?'Pertemuan 16 - UAS':'Pertemuan 8 - UTS';
  const judul=`Latihan ${label} — Skor ${skor}/${total} (${pct}%) Grade ${grade}`;
  const jawaban=quizState.answers.map((a,i)=>`Q${i+1}:${a!==null?['A','B','C','D'][a]:'?'}(${a===soalArr[i].jawaban?'✓':'✗'})`).join(' | ');
  const pernyataan=`Skor: ${skor}/${total} (${pct}%) | Grade: ${grade} | Jawaban: ${jawaban}`;

  // ── Entry ID mapping (dari Google Forms Inspector) ──
  // entry.1172022287 = Nama
  // entry.1517484372 = NIM
  // entry.1349073719 = Pertemuan
  // entry.2051643814 = Judul Materi
  // entry.1959448750 = Pernyataan

  const FORM_ACTION='https://docs.google.com/forms/d/e/1FAIpQLSfrUm7096iZhLvEVVNo-uWLeSfaOJBe28yhcp0ASN-xqJMmvw/formResponse';

  const body=new URLSearchParams({
    'entry.1172022287': quizState.nama,
    'entry.1517484372': quizState.nim,
    'entry.1349073719': pertemuan,
    'entry.2051643814': judul,
    'entry.1959448750': pernyataan,
    'emailAddress': quizState.email
  });

  // Kirim otomatis via fetch (no-cors) — langsung masuk spreadsheet
  fetch(FORM_ACTION, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: body.toString()
  }).then(()=>{
    quizState.terkirim=true;
    render();
    showSuccessModal(skor,total,pct,grade,label);
  }).catch(()=>{
    // Fallback: buka form manual jika fetch gagal
    const fallbackUrl=`${FORM_ACTION.replace('/formResponse','/viewform')}?usp=pp_url`
      +`&entry.1172022287=${encodeURIComponent(quizState.nama)}`
      +`&entry.1517484372=${encodeURIComponent(quizState.nim)}`
      +`&entry.1349073719=${encodeURIComponent(pertemuan)}`
      +`&entry.2051643814=${encodeURIComponent(judul)}`
      +`&entry.1959448750=${encodeURIComponent(pernyataan)}`;
    showSuccessModal(skor,total,pct,grade,label,fallbackUrl);
  });
}

function showSuccessModal(skor,total,pct,grade,label,fallbackUrl){
  const modal=document.getElementById('form-modal');
  if(!modal)return;
  const gc=pct>=81?'#34C759':pct>=66?'#007AFF':pct>=56?'#FF9500':'#FF3B30';
  modal.querySelector('.modal-score').textContent=`${skor}/${total} (${pct}%)`;
  modal.querySelector('.modal-nama').textContent=quizState.nama;
  modal.querySelector('.modal-nim').textContent=quizState.nim;
  modal.querySelector('.modal-grade').textContent=grade;
  modal.querySelector('.modal-grade').style.color=gc;
  modal.querySelector('.modal-label').textContent=`Latihan Soal ${label}`;
  const btn=modal.querySelector('.modal-form-btn');
  if(fallbackUrl){
    // fetch gagal — tampilkan tombol buka form manual
    btn.textContent='📋 Buka Google Forms (Kirim Manual)';
    btn.onclick=()=>{window.open(fallbackUrl,'_blank');modal.style.display='none';};
    modal.querySelector('.modal-status').textContent='⚠️ Kirim otomatis gagal. Klik tombol di bawah untuk kirim manual.';
    modal.querySelector('.modal-status').style.color='#FF9500';
  } else {
    // fetch berhasil
    btn.textContent='✅ Berhasil Dikirim ke Dosen!';
    btn.style.background='#34C759';
    btn.onclick=()=>{modal.style.display='none';};
    modal.querySelector('.modal-status').textContent='✅ Data sudah masuk ke spreadsheet dosen secara otomatis.';
    modal.querySelector('.modal-status').style.color='#34C759';
  }
  modal.style.display='flex';
}
function closeModal(){const m=document.getElementById('form-modal');if(m)m.style.display='none';}
function resetQuiz(){quizState=null;render();}

function renderQuizSection(m,si,quizType){
  const soalArr=quizType==='UAS'?soalUAS:soalUTS;
  const label=quizType==='UAS'?'UAS':'UTS';
  const icon=quizType==='UAS'?'🏆':'🧪';
  const coverTopik=quizType==='UAS'
    ?'Kausalitas, Surveilans, PM, PTM, Bias, SR/Meta-analisis, Telaah Jurnal'
    :'Hierarki Bukti, PICO, Desain, Kohort, Kasus-Kontrol, Ukuran Asosiasi, Insidens & Prevalens';

  if(!quizState||quizState.type!==quizType){
    return `<div>
      <div class="back-row"><button class="back-btn" onclick="goBackToMeeting(${m.id})">${backSVG()} Kembali</button></div>
      <div class="page" style="padding-top:0">
        <div class="pertemuan-badge" style="background:${m.color}15;color:${m.color}">Pertemuan ${m.id} • ${label}</div>
        <h2 style="font-size:24px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:16px;letter-spacing:-0.02em">${icon} Latihan Soal ${label}</h2>
        <div style="background:var(--card);border-radius:18px;padding:22px;box-shadow:var(--card-shadow);margin-bottom:16px">
          <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px">📋 Petunjuk Pengerjaan</div>
          <div style="font-size:15px;color:var(--text-secondary);line-height:1.9">
            <div>• <b>20 soal</b> pilihan ganda (A–D)</div>
            <div>• Topik: ${coverTopik}</div>
            <div>• Setiap soal bernilai <b>1 poin</b> (total 20)</div>
            <div>• Hasil dikirim ke dosen via <b>Google Forms</b></div>
            <div>• Isi Nama, NIM, dan Email sebelum submit</div>
          </div>
        </div>
        <div style="background:linear-gradient(135deg,${m.color},${m.color}BB);border-radius:18px;padding:20px;margin-bottom:16px;color:#fff">
          <div style="font-size:14px;opacity:0.85;margin-bottom:8px;font-weight:600">Bobot Nilai</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            ${['A ≥81%','B 66–80%','C 56–65%','D 41–55%'].map(g=>`<div style="background:rgba(255,255,255,0.2);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700">${g}</div>`).join('')}
          </div>
        </div>
        <button class="mark-btn" style="background:${m.color};color:#fff" onclick="startQuiz('${quizType}')">🚀 Mulai Latihan Soal ${label}</button>
      </div>
    </div>`;
  }

  if(quizState.submitted){
    const skor=getScore();
    const total=soalArr.length;
    const pct=Math.round((skor/total)*100);
    const grade=pct>=81?'A':pct>=66?'B':pct>=56?'C':pct>=41?'D':'E';
    const gc=pct>=81?'#34C759':pct>=66?'#007AFF':pct>=56?'#FF9500':'#FF3B30';
    const msg=pct>=81?'Sangat Baik 🎉':pct>=66?'Baik 👍':pct>=56?'Cukup 📚':'Perlu Belajar Lagi 💪';
    const pembahasanHTML=soalArr.map((s,i)=>{
      const ua=quizState.answers[i];
      const benar=ua===s.jawaban;
      return `<div style="background:var(--card);border-radius:14px;padding:16px 18px;margin-bottom:10px;box-shadow:var(--card-shadow);border-left:4px solid ${benar?'#34C759':'#FF3B30'}">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">${s.topik}</div>
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px">${s.no}. ${s.soal}</div>
        ${s.opsi.map((o,oi)=>{
          let bg='var(--sep)';let fc='var(--text-muted)';
          if(oi===s.jawaban){bg='#34C75920';fc='#34C759';}
          else if(oi===ua&&!benar){bg='#FF3B3020';fc='#FF3B30';}
          return `<div style="background:${bg};border-radius:8px;padding:7px 12px;margin-bottom:4px;font-size:13px;color:${fc};font-weight:${oi===s.jawaban?'700':'400'}">${o}${oi===s.jawaban?' ✓':oi===ua&&!benar?' ✗':''}</div>`;
        }).join('')}
        <div style="margin-top:10px;font-size:13px;color:var(--text-secondary);line-height:1.6;background:var(--tint-bg);padding:10px 12px;border-radius:8px">💡 ${s.penjelasan}</div>
      </div>`;
    }).join('');
    return `<div>
      <div class="back-row"><button class="back-btn" onclick="goBackToMeeting(${m.id})">${backSVG()} Kembali</button></div>
      <div class="page" style="padding-top:0">
        <div style="background:linear-gradient(135deg,${gc},${gc}BB);border-radius:22px;padding:28px 24px;margin-bottom:20px;color:#fff;text-align:center">
          <div style="font-size:14px;font-weight:700;opacity:0.8;margin-bottom:4px">Latihan Soal ${label}</div>
          <div style="font-size:56px;font-weight:900;letter-spacing:-0.03em">${skor}<span style="font-size:28px;opacity:0.7">/${total}</span></div>
          <div style="font-size:32px;font-weight:800;margin-top:4px">Grade ${grade}</div>
          <div style="font-size:15px;opacity:0.8;margin-top:6px">${pct}% — ${msg}</div>
          <div style="margin-top:14px;font-size:14px;opacity:0.75">${quizState.nama} • ${quizState.nim}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px">
          <div style="background:var(--card);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--card-shadow)"><div style="font-size:22px;font-weight:800;color:#34C759">${skor}</div><div style="font-size:11px;color:var(--text-muted);font-weight:600">Benar</div></div>
          <div style="background:var(--card);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--card-shadow)"><div style="font-size:22px;font-weight:800;color:#FF3B30">${total-skor}</div><div style="font-size:11px;color:var(--text-muted);font-weight:600">Salah</div></div>
          <div style="background:var(--card);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--card-shadow)"><div style="font-size:22px;font-weight:800;color:${gc}">${pct}%</div><div style="font-size:11px;color:var(--text-muted);font-weight:600">Skor</div></div>
        </div>
        <div class="section-label">Pembahasan Soal</div>
        ${pembahasanHTML}
        <button class="mark-btn" style="background:#FF9500;color:#fff;margin-top:8px" onclick="resetQuiz()">🔄 Ulangi Latihan</button>
        <button class="next-btn" onclick="sendToGoogleForms()">📋 Kirim Hasil ke Dosen</button>
      </div>
    </div>`;
  }

  // Soal aktif
  const answered=quizState.answers.filter(a=>a!==null).length;
  const soalHTML=soalArr.map((s,i)=>{
    const ua=quizState.answers[i];
    return `<div style="background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:var(--card-shadow)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:${m.color};text-transform:uppercase;letter-spacing:0.04em">${s.topik}</div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:600">${i+1}/${soalArr.length}</div>
      </div>
      <div style="font-size:15px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px">${s.soal}</div>
      ${s.opsi.map((o,oi)=>`<div onclick="selectAnswer(${i},${oi})" style="background:${ua===oi?m.color+'20':'var(--sep)'};border:2px solid ${ua===oi?m.color:'transparent'};border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:14px;color:${ua===oi?m.color:'var(--text)'};font-weight:${ua===oi?'600':'400'};cursor:pointer;transition:all 0.15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent">${o}</div>`).join('')}
    </div>`;
  }).join('');
  return `<div>
    <div class="back-row"><button class="back-btn" onclick="goBackToMeeting(${m.id})">${backSVG()} Kembali</button></div>
    <div class="page" style="padding-top:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><div class="pertemuan-badge" style="background:${m.color}15;color:${m.color};display:inline-block;margin-bottom:4px">Pertemuan ${m.id} • ${label}</div><h2 style="font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.02em">${icon} Latihan Soal ${label}</h2></div>
        <div style="background:${m.color};color:#fff;border-radius:12px;padding:8px 14px;text-align:center;flex-shrink:0"><div style="font-size:18px;font-weight:800">${answered}</div><div style="font-size:10px;opacity:0.85">/${soalArr.length}</div></div>
      </div>
      <div class="prog-bar-bg" style="margin-bottom:20px"><div class="prog-bar-fill" style="background:${m.color};width:${Math.round((answered/soalArr.length)*100)}%"></div></div>
      ${soalHTML}

      </div>
      <button class="mark-btn" style="background:${m.color};color:#fff;margin-top:16px" onclick="submitQuiz()">✅ Selesai & Lihat Hasil</button>
    </div>
  </div>`;
}

// ============================================================
// FORM URL
// ============================================================
function buildFormURL(m){
  return "https://docs.google.com/forms/d/e/1FAIpQLSfrUm7096iZhLvEVVNo-uWLeSfaOJBe28yhcp0ASN-xqJMmvw/viewform";
}

// ============================================================
// ACTIONS
// ============================================================
function switchTab(tab){currentTab=tab;selM=null;selS=null;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`tb-${tab}`).classList.add('active');render();}
function toggleDark(){dark=!dark;document.getElementById('root').classList.toggle('dark',dark);render();}
function openMeeting(id){selM=meetings.find(m=>m.id===id);selS=null;currentTab='materi';render();}
function openSection(mid,si){selM=meetings.find(m=>m.id===mid);selS=si;render();}
function goBack(tab){selM=null;selS=null;currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(`tb-${tab}`).classList.add('active');render();}
function goBackToMeeting(mid){selM=meetings.find(m=>m.id===mid);selS=null;render();}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  const area=document.getElementById('scroll-area');
  area.scrollTop=0;
  let html='';
  if(selS!==null&&selM)html=renderSectionDetail(selM,selS);
  else if(selM)html=renderMeetingDetail(selM);
  else if(currentTab==='home')html=renderHome();
  else if(currentTab==='materi')html=renderMateri();
  else if(currentTab==='progress')html=renderProgress();
  area.innerHTML=html;
}

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
updateClock();setInterval(updateClock,30000);
render();
</script>
